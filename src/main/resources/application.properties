spring.application.name=meeting-map

spring.datasource.url=jdbc:mysql://localhost:3306/capstone_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=scott
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#none: db를 변경하지 않음, create: 실행마다 db새롭게 만듬, update: 실행마다 스키마 업데이트, validate: 데이터베이스 스키마가 엔티티와 일치하는지 확인
spring.jpa.hibernate.ddl-auto=validate

#JPA에서 mysql8언어로 변환
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#JPA에서 SQL 쿼리를 콘솔에 출력
spring.jpa.show-sql=true

#쿠키를 사용하여 세션을 유지
server.servlet.session.tracking-modes=cookie

server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

#포트 통합을 위해 포트 지정
